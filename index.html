<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UyBor Navoiy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .soft-shadow {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04), 0 4px 10px -3px rgba(0, 0, 0, 0.02);
        }

        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            pointer-events: auto;
            padding: 16px 20px;
            border-radius: 16px;
            background: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            transform: translateX(120%);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid #f1f5f9;
        }

        .toast.show {
            transform: translateX(0);
        }

        .loader {
            border: 3px solid #f1f5f9;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .image-preview-item {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 14px;
            overflow: hidden;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
        }

        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .aspect-auto-img {
            object-fit: contain;
            background: #f1f5f9;
        }

        #full-loader-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .map-marker-blue {
            filter: hue-rotate(0deg);
        }

        .map-marker-red {
            filter: hue-rotate(140deg) saturate(1.5);
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {
            .mobile-bottom-nav {
                display: flex !important;
            }

            main {
                padding-bottom: 0 !important;
                height: 100%;
                overflow: hidden;
            }

            #main-content {
                padding-bottom: 140px !important;
                -webkit-overflow-scrolling: touch;
            }

            .header-title {
                font-size: 1.1rem !important;
            }

            .p-8 {
                padding: 1rem !important;
            }

            .grid {
                gap: 1rem !important;
            }

            #modal-content {
                max-height: 85vh;
                max-height: 85dvh;
                border-radius: 0;
                width: 100% !important;
                margin: 0;
                bottom: 0px !important;
                position: fixed;
                border-top-left-radius: 32px;
                border-top-right-radius: 32px;
                box-shadow: 0 -20px 40px rgba(0, 0, 0, 0.1);
            }

            #modal-container {
                padding: 0;
                align-items: flex-end;
            }

            .listing-card-img {
                height: 160px !important;
            }

            .dashboard-card {
                padding: 1rem !important;
                gap: 0.75rem !important;
            }

            .dashboard-card i {
                font-size: 1.25rem !important;
                width: 3rem !important;
                height: 3rem !important;
            }

            .toast {
                left: 16px;
                right: 16px;
                bottom: 100px;
                transform: translateY(200%);
            }

            .toast.show {
                transform: translateY(0);
            }

            #toast-container {
                top: auto;
                bottom: 0;
                right: 0;
                left: 0;
                padding: 0 16px;
                z-index: 10001;
            }

            #main-content {
                scrollbar-width: none !important;
                -ms-overflow-style: none !important;
            }

            #main-content::-webkit-scrollbar {
                display: none !important;
            }

            #login-screen {
                overflow-y: auto;
                align-items: center;
            }

            #login-screen>div {
                margin: auto;
                max-width: 90%;
            }
        }

        .mobile-bottom-nav {
            display: none;
            position: fixed;
            bottom: 24px;
            left: 24px;
            right: 24px;
            height: 72px;
            background: rgba(255, 255, 255, 0.82) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            border-radius: 36px !important;
            z-index: 1000 !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1) !important;
            justify-content: space-around;
            align-items: center;
            padding: 0 16px;
        }

        .mobile-nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            transition: all 0.3s;
            gap: 4px;
            flex: 1;
            height: 100%;
        }

        .mobile-nav-btn.active {
            color: #2563eb;
        }

        .mobile-nav-btn i {
            font-size: 1.25rem;
        }

        .mobile-nav-btn span {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .scroll-hide {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }
    </style>
</head>

<body>
    <div id="full-loader-overlay" class="hidden">
        <div class="loader w-12 h-12 border-4"></div>
    </div>
    <div id="toast-container"></div>

    <!-- Login -->
    <div id="login-screen" class="fixed inset-0 bg-[#f8fafc] z-[1000] flex items-center justify-center p-4">
        <div class="w-full max-w-[420px] bg-white rounded-[32px] p-10 soft-shadow border border-slate-100 text-center">
            <div
                class="w-20 h-20 bg-blue-600 rounded-[24px] flex items-center justify-center text-white text-4xl mx-auto mb-8 shadow-xl shadow-blue-200">
                <i class="fa-solid fa-house-chimney"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-900 mb-2">Xush kelibsiz!</h1>
            <p class="text-slate-500 mb-10 font-medium">UyBor Navoiy tizimiga kiring</p>
            <form id="login-form" class="space-y-6">
                <div class="text-left">
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Username</label>
                    <input type="text" id="login-username" required
                        class="w-full h-14 bg-slate-50 border-none rounded-2xl px-5 focus:ring-2 focus:ring-blue-500 transition-all font-semibold"
                        placeholder="admin yoki makler">
                </div>
                <div class="text-left">
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Parol</label>
                    <input type="password" id="login-password" required
                        class="w-full h-14 bg-slate-50 border-none rounded-2xl px-5 focus:ring-2 focus:ring-blue-500 transition-all font-semibold"
                        placeholder="••••••••">
                </div>
                <button type="submit"
                    class="w-full h-14 bg-blue-600 text-white rounded-2xl font-bold text-lg hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">Kirish</button>
            </form>
        </div>
    </div>

    <!-- App Container -->
    <div id="app" class="hidden w-full h-full flex flex-col md:flex-row overflow-hidden relative">
        <!-- Sidebar -->
        <aside id="sidebar"
            class="fixed inset-y-0 left-0 w-72 bg-white border-r border-slate-100 z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300 md:relative flex flex-col">
            <div class="p-8 flex items-center gap-4">
                <div
                    class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg shadow-blue-100">
                    <i class="fa-solid fa-house-user"></i>
                </div>
                <div>
                    <h2 class="text-xl font-black text-slate-900 leading-none">UyBor</h2>
                    <span class="text-[10px] font-black text-blue-600 uppercase tracking-[2px]">Navoiy</span>
                </div>
            </div>
            <nav id="nav-links" class="flex-1 px-4 space-y-1 overflow-y-auto"></nav>
            <div class="p-6 border-t border-slate-50">
                <div class="bg-slate-50 rounded-2xl p-4 mb-4 flex items-center gap-3">
                    <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-blue-600 shadow-sm font-bold"
                        id="user-avatar-text">A</div>
                    <div class="overflow-hidden">
                        <p class="font-bold text-sm text-slate-900 truncate" id="sidebar-user-name">User Name</p>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-wider"
                            id="sidebar-user-role">Role</p>
                    </div>
                </div>
                <button onclick="logout()"
                    class="w-full h-12 text-red-500 hover:bg-red-50 rounded-xl font-bold transition-all flex items-center justify-center gap-2"><i
                        class="fa-solid fa-right-from-bracket"></i> Chiqish</button>
            </div>
        </aside>

        <!-- Main -->
        <main class="flex-1 flex flex-col min-w-0 bg-[#f8fafc]">
            <header
                class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 flex items-center justify-between px-8 z-40 sticky top-0">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()"
                        class="md:hidden w-10 h-10 flex items-center justify-center text-slate-500"><i
                            class="fa-solid fa-bars-staggered text-xl"></i></button>
                    <h2 id="page-title" class="text-2xl font-black text-slate-900 header-title">Dashboard</h2>
                </div>
                <div id="header-actions"></div>
            </header>
            <div id="main-content" class="flex-1 overflow-y-auto p-8 relative scroll-hide"></div>
        </main>
        <!-- Bottom Nav for Mobile -->
        <nav id="mobile-nav" class="mobile-bottom-nav"></nav>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="hidden fixed inset-0 z-[2000] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div id="modal-content"
            class="bg-white rounded-[32px] w-full max-w-2xl relative z-10 soft-shadow overflow-y-auto flex flex-col max-h-[90vh]">
        </div>
    </div>

    <!-- Map Picker Modal -->
    <div id="map-modal" class="hidden fixed inset-0 z-[3000] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onclick="closeMapModal()"></div>
        <div
            class="bg-white rounded-[32px] w-full max-w-4xl h-[80vh] relative z-10 soft-shadow overflow-hidden flex flex-col">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-xl font-bold">Xaritadan belgilang</h3>
                <button onclick="closeMapModal()"
                    class="w-10 h-10 rounded-full hover:bg-slate-100 flex items-center justify-center"><i
                        class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="picker-map" class="flex-1 bg-slate-100"></div>
            <div class="p-6 border-t border-slate-100 flex gap-4 items-center">
                <input type="text" id="picker-address"
                    class="flex-1 h-12 bg-slate-50 border-none rounded-xl px-4 font-semibold"
                    placeholder="Manzil matni...">
                <button onclick="confirmLocation()"
                    class="h-12 bg-blue-600 text-white px-8 rounded-xl font-bold shadow-lg shadow-blue-100">Tasdiqlash</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase Initialization
        const supabaseUrl = 'https://jxnudymzvwezvhgxmxby.supabase.co';
        const supabaseKey = 'sb_publishable_NVpi4VEHQ92yPrIE1FxZcQ_FcPa3tg5';
        const supabaseClient = window.supabase ? window.supabase.createClient(supabaseUrl, supabaseKey) : null;

        // Data Keys
        const [K_USERS, K_LISTINGS, K_ARCHIVE, K_REQUESTS] = ['u_u', 'u_l', 'u_a', 'u_r'];

        // State
        let users = [];

        let listings = [];
        let archive = [];
        let requests = [];
        let currentUser = JSON.parse(sessionStorage.getItem('u_session')) || null;
        let uploadImgs = [];
        let curPage = 'dashboard';
        let mapFocus = null;
        let pMap, pMarker, pLoc = null;

        // Helpers

        const save = () => { /* Saved securely on Supabase */ };
        const toast = (m, t = 'info') => {
            const c = document.getElementById('toast-container');
            const el = document.createElement('div');
            const icons = { success: 'fa-circle-check text-emerald-500', error: 'fa-circle-exclamation text-red-500', info: 'fa-circle-info text-blue-500' };
            el.className = `toast show ${t}`;
            el.innerHTML = `<i class="fa-solid ${icons[t]} text-xl"></i> <span>${m}</span>`;
            c.appendChild(el);
            setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 500); }, 3000);
        };
        const money = (v, c = 'USD') => new Intl.NumberFormat('uz-UZ').format(v) + (c === 'USD' ? ' $' : ' so\'m');
        const dt = (s) => new Date(s).toLocaleString('uz-UZ', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        const gid = () => Math.random().toString(36).substr(2, 9);
        const toggleLoader = (v) => document.getElementById('full-loader-overlay').style.display = v ? 'flex' : 'none';
        window.closeModal = () => document.getElementById('modal-container').classList.add('hidden');
        window.closeMapModal = () => document.getElementById('map-modal').classList.add('hidden');
        const loadDataFromSupabase = async () => {
            toggleLoader(true);
            try {
                let { data: u } = await supabaseClient.from('users').select('*');
                if (u) users = u.map(x => ({ id: x.id, username: x.username, password: x.password, name: x.name, role: x.role, phone: x.phone }));

                let { data: l } = await supabaseClient.from('listings').select('*');
                if (l) {
                    listings = l.filter(x => x.status === 'active').map(x => ({ id: x.id, maklerId: x.makler_id, category: x.category, type: x.type, addressText: x.address_text, price: x.price, currency: x.currency, rooms: x.rooms, area: x.area, desc: x.desc_text, loc: { lat: parseFloat(x.lat || 0), lng: parseFloat(x.lng || 0) }, images: x.images || [], createdAt: x.created_at }));
                    archive = l.filter(x => x.status === 'sold').map(x => ({ id: x.id, maklerId: x.makler_id, category: x.category, type: x.type, addressText: x.address_text, price: x.price, currency: x.currency, rooms: x.rooms, area: x.area, desc: x.desc_text, loc: { lat: parseFloat(x.lat || 0), lng: parseFloat(x.lng || 0) }, images: x.images || [], createdAt: x.created_at, soldAt: x.sold_at }));
                }

                let { data: r } = await supabaseClient.from('requests').select('*');
                if (r) requests = r.map(x => ({ id: x.id, listingId: x.listing_id, maklerId: x.makler_id, status: x.status, date: x.created_at }));
            } catch (e) { console.error(e); }
            toggleLoader(false);
        };


        // Auth
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            toggleLoader(true);
            const uInput = document.getElementById('login-username').value;
            const pInput = document.getElementById('login-password').value;
            const { data: u } = await supabaseClient.from('users').select('*').eq('username', uInput).eq('password', pInput).single();
            if (u) {
                currentUser = { id: u.id, username: u.username, password: u.password, name: u.name, role: u.role, phone: u.phone };
                sessionStorage.setItem('u_session', JSON.stringify(currentUser));
                await loadDataFromSupabase();
                init();
            } else toast('Login yoki parol xato', 'error');
            toggleLoader(false);
        };
        const logout = () => {
            sessionStorage.removeItem('u_session');
            location.reload();
        };

        // Navigation
        const pages = {
            admin: [
                { id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard' },
                { id: 'listings', icon: 'fa-house', label: 'Uylar' },
                { id: 'archive', icon: 'fa-box-archive', label: 'Arxiv' },
                { id: 'map', icon: 'fa-map-location-dot', label: 'Xarita' },
                { id: 'requests', icon: 'fa-bell', label: 'So\'rovlar' },
                { id: 'maklers', icon: 'fa-users', label: 'Maklerlar' },
                { id: 'telegram', icon: 'fa-paper-plane', label: 'Telegram Bot' }
            ],
            makler: [
                { id: 'listings', icon: 'fa-house', label: 'Uylar' },
                { id: 'archive', icon: 'fa-box-archive', label: 'Sotilganlar' },
                { id: 'map', icon: 'fa-map-location-dot', label: 'Xarita' },
                { id: 'requests', icon: 'fa-clock', label: 'Kutilayotgan' }
            ]
        };

        const navigate = (id) => {
            curPage = id;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-blue-50', 'text-blue-600', 'font-black'));
            document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));

            document.getElementById('nav-' + id)?.classList.add('bg-blue-50', 'text-blue-600', 'font-black');
            document.getElementById('mobile-nav-' + id)?.classList.add('active');

            const page = pages[currentUser.role].find(p => p.id === id);
            document.getElementById('page-title').innerText = page ? page.label : 'Dashboard';

            // Reset map variables when navigating away from map to ensure fresh init
            if (id !== 'map') {
                mapInstance = null;
                currentLayer = null;
            }

            render(id);
            if (window.innerWidth < 768) toggleSidebar(false);
        };

        const toggleSidebar = (v) => {
            const s = document.getElementById('sidebar');
            if (v === undefined) s.classList.toggle('-translate-x-full');
            else v ? s.classList.remove('-translate-x-full') : s.classList.add('-translate-x-full');

            // Re-render map if it exists to fix sizing issues after sidebar toggle
            if (curPage === 'map' && mapInstance) {
                setTimeout(() => mapInstance.invalidateSize(), 300);
            }
        };

        // Renderers
        const render = (id) => {
            const main = document.getElementById('main-content');
            const hActions = document.getElementById('header-actions');
            main.innerHTML = '';
            hActions.innerHTML = '';

            if (id === 'dashboard') renderDashboard(main);
            else if (id === 'listings') renderListings(main, hActions, false);
            else if (id === 'archive') renderListings(main, hActions, true);
            else if (id === 'maklers') renderMaklers(main, hActions);
            else if (id === 'requests') renderRequests(main);
            else if (id === 'map') renderMap(main);
            else if (id === 'telegram') renderTelegramBot(main, hActions);
        };

        const renderDashboard = (con) => {
            if (currentUser.role !== 'admin') {
                con.innerHTML = `<div class="bg-white p-12 rounded-[32px] soft-shadow text-center">
                    <h2 class="text-3xl font-black mb-4">Salom, ${currentUser.name}!</h2>
                    <p class="text-slate-500">Bugungi sotuvlaringizni boshlang.</p>
                </div>`;
                return;
            }
            const activeCount = listings.length;
            const soldCount = archive.length;
            const mCount = users.filter(u => u.role === 'makler').length;
            con.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                    <div class="bg-white p-8 rounded-[32px] soft-shadow border border-slate-50 flex items-center gap-6 dashboard-card">
                        <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-3xl"><i class="fa-solid fa-house"></i></div>
                        <div><p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Sotuvda</p><h3 class="text-4xl font-black">${activeCount}</h3></div>
                    </div>
                    <div class="bg-white p-8 rounded-[32px] soft-shadow border border-slate-50 flex items-center gap-6 dashboard-card">
                        <div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center text-3xl"><i class="fa-solid fa-check-double"></i></div>
                        <div><p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Sotilgan</p><h3 class="text-4xl font-black">${soldCount}</h3></div>
                    </div>
                    <div class="bg-white p-8 rounded-[32px] soft-shadow border border-slate-50 flex items-center gap-6 dashboard-card">
                        <div class="w-16 h-16 bg-purple-50 text-purple-600 rounded-2xl flex items-center justify-center text-3xl"><i class="fa-solid fa-users"></i></div>
                        <div><p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Maklerlar</p><h3 class="text-4xl font-black">${mCount}</h3></div>
                    </div>
                </div>
                <div class="bg-white p-10 rounded-[40px] soft-shadow border border-slate-50">
                    <h4 class="text-xl font-black mb-8">Reyting</h4>
                    <div class="space-y-6">
                        ${users.filter(u => u.role === 'makler').map(m => {
                const count = archive.filter(a => a.maklerId === m.id).length;
                return `
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center font-bold text-slate-600">${m.name[0]}</div>
                                    <div class="flex-1">
                                        <div class="flex justify-between mb-2"><span class="font-bold">${m.name}</span><span class="font-black text-blue-600">${count} ta</span></div>
                                        <div class="h-2 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-blue-600 rounded-full" style="width: ${Math.min(100, (count / 10) * 100)}%"></div></div>
                                    </div>
                                </div>
                            `;
            }).join('')}
                    </div>
                </div>
            `;
        };
        const renderListings = (con, act, isArchive) => {
            let data = isArchive ? archive : listings;

            const filterHtml = `

            const bytes = atob(data);
            const arr = new Uint8Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);

                } else {
                    // No images
                    const r = await tgApiCall('sendMessage', { chat_id: grp.id, text: msg, parse_mode: 'Markdown' });
                    if (!r.ok) allOk = false;
                }
            }
            return allOk;
        };

        const runScheduledSend = async () => {
            if (!tgSettings.active) return;
            if (tgSettings.selectedListings.length === 0) return;
            if (tgSettings.groups.length === 0) return;

            const idx = tgSettings.sendIndex % tgSettings.selectedListings.length;
            const listingId = tgSettings.selectedListings[idx];
            const item = listings.find(l => l.id === listingId);

            if (item) {
                const ok = await sendListingToGroups(item);
                tgSettings.sendIndex++;
                tgSettings.lastSentAt = new Date().toISOString();
                saveTg();
                if (curPage === 'telegram') renderTelegramBot(document.getElementById('main-content'), document.getElementById('header-actions'));
                if (ok) toast(`"${item.addressText}" Telegram guruhlariga yuborildi`, 'success');
                else toast('Ba\'zi guruhlariga yuborishda xatolik', 'error');
            } else {
                // listing removed, skip
                tgSettings.sendIndex++;
                saveTg();
            }
        };

        const startTgScheduler = () => {
            if (tgSchedulerTimer) clearInterval(tgSchedulerTimer);
            if (!tgSettings.active) return;
            const ms = tgSettings.intervalHours * 60 * 60 * 1000;
            tgSchedulerTimer = setInterval(runScheduledSend, ms);
        };

        const renderTelegramBot = (con, act) => {
            if (currentUser.role !== 'admin') {
                con.innerHTML = `<div class="h-64 flex items-center justify-center text-slate-300 font-bold text-xl">Faqat admin uchun</div>`;
                return;
            }

            const selListingIds = new Set(tgSettings.selectedListings);
            const statusColor = tgSettings.active ? 'bg-emerald-500' : 'bg-slate-300';
            const statusText = tgSettings.active ? 'FAOL' : 'TO\'XTATILGAN';

            con.innerHTML = `
            <div class="space-y-8">

                <!-- Status Banner -->
                <div class="flex items-center gap-6 bg-white rounded-[28px] p-6 soft-shadow border border-slate-50">
                    <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl" style="background:linear-gradient(135deg,#0088cc22,#0088cc44)">
                        <i class="fa-brands fa-telegram" style="color:#0088cc"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-xl font-black text-slate-900">Telegram Bot</h3>
                        <p class="text-sm font-medium text-slate-400">Guruh va kanallarga avtomatik uy e'lonlari yuborish</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-white text-xs font-black ${statusColor}">
                            <span class="w-2 h-2 bg-white rounded-full ${tgSettings.active ? 'animate-pulse' : ''}"></span>
                            ${statusText}
                        </span>
                        ${tgSettings.lastSentAt ? `<span class="text-xs font-bold text-slate-400">Oxirgi: ${dt(tgSettings.lastSentAt)}</span>` : ''}
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

                    <!-- LEFT: Groups + Interval + Controls -->
                    <div class="space-y-6">

                        <!-- Add Group/Channel -->
                        <div class="bg-white rounded-[28px] p-8 soft-shadow border border-slate-50">
                            <h4 class="text-base font-black text-slate-900 mb-6 flex items-center gap-2">
                                <i class="fa-solid fa-users-rectangle text-blue-500"></i> Guruh / Kanal qo'shish
                            </h4>
                            <p class="text-xs font-bold text-slate-400 mb-4 bg-blue-50 p-3 rounded-xl leading-relaxed">
                                <i class="fa-solid fa-circle-info text-blue-500 mr-1"></i>
                                Botni guruh yoki kanalga admin qilib qo'shing. Keyin chat ID sini kiriting.
                                Masalan: <code class="bg-white px-1 rounded">-1001234567890</code>
                            </p>
                            <div class="flex gap-3 mb-4">
                                <input type="text" id="tg-group-id" placeholder="Chat ID: -100123456789" class="flex-1 h-12 bg-slate-50 border-none rounded-xl px-4 font-bold text-sm focus:ring-2 focus:ring-blue-500">
                                <input type="text" id="tg-group-name" placeholder="Guruh nomi" class="flex-1 h-12 bg-slate-50 border-none rounded-xl px-4 font-bold text-sm focus:ring-2 focus:ring-blue-500">
                                <button onclick="tgAddGroup()" class="h-12 w-12 bg-blue-600 text-white rounded-xl flex items-center justify-center hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">
                                    <i class="fa-solid fa-plus"></i>
                                </button>
                            </div>
                            <div class="space-y-3">
                                ${tgSettings.groups.length === 0 ? `<div class="text-center py-6 text-slate-300 text-sm font-bold"><i class="fa-solid fa-inbox text-2xl mb-2 block"></i>Hali guruh qo'shilmagan</div>` : ''}
                                ${tgSettings.groups.map(g => `
                                    <div class="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl">
                                        <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white text-sm" style="background:linear-gradient(135deg,#0088cc,#0055aa)">
                                            <i class="fa-brands fa-telegram"></i>
                                        </div>
                                        <div class="flex-1 min-w-0">
                                            <p class="font-black text-slate-900 text-sm truncate">${g.name}</p>
                                            <p class="text-[10px] font-bold text-slate-400">${g.id}</p>
                                        </div>
                                        <button onclick="tgRemoveGroup('${g.id}')" class="w-9 h-9 bg-red-50 text-red-400 rounded-xl flex items-center justify-center hover:bg-red-500 hover:text-white transition-all">
                                            <i class="fa-solid fa-trash text-xs"></i>
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Interval & Controls -->
                        <div class="bg-white rounded-[28px] p-8 soft-shadow border border-slate-50">
                            <h4 class="text-base font-black text-slate-900 mb-6 flex items-center gap-2">
                                <i class="fa-solid fa-clock text-purple-500"></i> Yuborish oralig'i
                            </h4>
                            <div class="flex items-center gap-4 mb-6">
                                <input type="number" id="tg-interval" min="1" max="168" value="${tgSettings.intervalHours}"
                                    class="w-28 h-14 bg-slate-50 border-none rounded-2xl px-5 font-black text-2xl text-purple-600 text-center focus:ring-2 focus:ring-purple-500" oninput="tgUpdateInterval()">
                                <div>
                                    <p class="font-black text-slate-900">soatda bir marta</p>
                                    <p class="text-xs font-bold text-slate-400">Har <span id="tg-interval-display">${tgSettings.intervalHours}</span> soatda tanlangan uylar ketma-ket yuboriladi</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-3 gap-2 mb-6">
                                ${[1, 2, 3, 4, 6, 12].map(h => `
                                    <button onclick="tgSetInterval(${h})" class="h-10 rounded-xl text-sm font-black transition-all ${tgSettings.intervalHours === h ? 'bg-purple-600 text-white' : 'bg-slate-50 text-slate-500 hover:bg-purple-50'}"> ${h} soat</button>
                                `).join('')}
                            </div>
                            <div class="flex gap-3">
                                <button onclick="tgSendNow()" class="flex-1 h-14 bg-slate-100 text-slate-700 rounded-2xl font-black text-sm flex items-center justify-center gap-2 hover:bg-slate-200 transition-all">
                                    <i class="fa-solid fa-paper-plane"></i> Hozir yuborish
                                </button>
                                <button onclick="tgToggleActive()" class="flex-[1.5] h-14 rounded-2xl font-black text-sm flex items-center justify-center gap-2 transition-all shadow-lg ${tgSettings.active ? 'bg-red-500 text-white shadow-red-100 hover:bg-red-600' : 'bg-emerald-500 text-white shadow-emerald-100 hover:bg-emerald-600'}">
                                    <i class="fa-solid ${tgSettings.active ? 'fa-stop' : 'fa-play'}"></i> ${tgSettings.active ? 'To\'xtatish' : 'Ishga tushurish'}
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- RIGHT: Listing Selection -->
                    <div class="bg-white rounded-[28px] p-8 soft-shadow border border-slate-50">
                        <div class="flex items-center justify-between mb-6">
                            <h4 class="text-base font-black text-slate-900 flex items-center gap-2">
                                <i class="fa-solid fa-house text-emerald-500"></i> Yuborish uchun uylar
                            </h4>
                            <div class="flex gap-2">
                                <button onclick="tgSelectAll()" class="h-8 px-3 bg-emerald-50 text-emerald-600 rounded-xl text-xs font-black hover:bg-emerald-100 transition-all">Hammasi</button>
                                <button onclick="tgDeselectAll()" class="h-8 px-3 bg-slate-100 text-slate-500 rounded-xl text-xs font-black hover:bg-slate-200 transition-all">Bekor</button>
                            </div>
                        </div>
                        <p class="text-xs font-bold text-slate-400 mb-4">${tgSettings.selectedListings.length} ta tanlangan / ${listings.length} ta mavjud</p>
                        <div class="space-y-3 max-h-[500px] overflow-y-auto pr-1 scroll-hide">
                            ${listings.length === 0 ? `<div class="text-center py-8 text-slate-300 font-bold"><i class="fa-solid fa-house-circle-xmark text-3xl mb-2 block"></i>Sotuvdagi uy yo'q</div>` : ''}
                            ${listings.map(item => `
                                <label class="flex items-center gap-4 p-4 rounded-2xl cursor-pointer transition-all ${selListingIds.has(item.id) ? 'bg-emerald-50 border-2 border-emerald-200' : 'bg-slate-50 border-2 border-transparent hover:border-slate-200'}">
                                    <input type="checkbox" class="w-5 h-5 rounded accent-emerald-500" ${selListingIds.has(item.id) ? 'checked' : ''}
                                        onchange="tgToggleListing('${item.id}', this.checked)">
                                    <div class="w-12 h-12 rounded-xl overflow-hidden flex-shrink-0 bg-slate-100">
                                        ${item.images?.length > 0 ? `<img src="${item.images[0]}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-slate-300"><i class="fa-solid fa-image"></i></div>`}
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <p class="font-black text-slate-900 text-sm truncate">${item.addressText || 'Manzil yo\'q'}</p>
                                        <p class="text-xs font-bold text-blue-600 mt-0.5">${money(item.price, item.currency)}</p>
                                        <p class="text-[10px] font-bold text-slate-400">${item.type || 'Hovli'} · ${item.rooms} xona · ${item.area}m²</p>
                                    </div>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                </div>

                <!-- Activity Log -->
                <div class="bg-white rounded-[28px] p-8 soft-shadow border border-slate-50">
                    <h4 class="text-base font-black text-slate-900 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-chart-line text-blue-500"></i> Statistika
                    </h4>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-blue-50 p-5 rounded-2xl text-center">
                            <p class="text-3xl font-black text-blue-600">${tgSettings.groups.length}</p>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1">Guruhlar</p>
                        </div>
                        <div class="bg-emerald-50 p-5 rounded-2xl text-center">
                            <p class="text-3xl font-black text-emerald-600">${tgSettings.selectedListings.length}</p>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1">Tanlangan uylar</p>
                        </div>
                        <div class="bg-purple-50 p-5 rounded-2xl text-center">
                            <p class="text-3xl font-black text-purple-600">${tgSettings.intervalHours}h</p>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1">Interval</p>
                        </div>
                        <div class="bg-slate-50 p-5 rounded-2xl text-center">
                            <p class="text-3xl font-black text-slate-700">${tgSettings.sendIndex}</p>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1">Yuborilgan</p>
                        </div>
                    </div>
                </div>

            </div>`;
        };

        // Telegram Bot Actions
        window.tgAddGroup = async () => {
            const idVal = document.getElementById('tg-group-id')?.value?.trim();
            const nameVal = document.getElementById('tg-group-name')?.value?.trim();
            if (!idVal) return toast('Chat ID kiriting!', 'error');
            if (!nameVal) return toast('Guruh nomini kiriting!', 'error');
            if (tgSettings.groups.find(g => g.id === idVal)) return toast('Bu guruh allaqachon qo\'shilgan', 'error');

            toggleLoader(true);
            // Verify the chat exists
            const r = await tgApiCall('getChat', { chat_id: idVal });
            toggleLoader(false);

            if (!r.ok) {
                return toast(`Xatolik: ${r.description || 'Guruh topilmadi. Bot admin ekanligini tekshiring.'}`, 'error');
            }
            const chatTitle = r.result?.title || nameVal;
            tgSettings.groups.push({ id: idVal, name: chatTitle || nameVal });
            saveTg();
            toast(`"${chatTitle}" qo\'shildi!`, 'success');
            renderTelegramBot(document.getElementById('main-content'), document.getElementById('header-actions'));
        };

        window.tgRemoveGroup = (id) => {
            if (!confirm('Bu guruhni olib tashlamoqchimisiz?')) return;
            tgSettings.groups = tgSettings.groups.filter(g => g.id !== id);
            saveTg();
            renderTelegramBot(document.getElementById('main-content'), document.getElementById('header-actions'));
        };

        window.tgToggleListing = (id, checked) => {
            if (checked) {
                if (!tgSettings.selectedListings.includes(id)) tgSettings.selectedListings.push(id);
            } else {
                tgSettings.selectedListings = tgSettings.selectedListings.filter(x => x !== id);
            }
            saveTg();
            // update count display
            const el = document.querySelector('[class*="ta tanlangan"]');
            if (el) el.textContent = `${tgSettings.selectedListings.length} ta tanlangan / ${listings.length} ta mavjud`;
        };

        window.tgSelectAll = () => {
            tgSettings.selectedListings = listings.map(l => l.id);
            saveTg();
            renderTelegramBot(document.getElementById('main-content'), document.getElementById('header-actions'));
        };

        window.tgDeselectAll = () => {
            tgSettings.selectedListings = [];
            saveTg();
            renderTelegramBot(document.getElementById('main-content'), document.getElementById('header-actions'));
        };

        window.tgSetInterval = (h) => {
            tgSettings.intervalHours = h;
            saveTg();
            if (tgSettings.active) startTgScheduler();
            renderTelegramBot(document.getElementById('main-content'), document.getElementById('header-actions'));
        };

        window.tgUpdateInterval = () => {
            const v = parseInt(document.getElementById('tg-interval')?.value);
            if (!isNaN(v) && v >= 1) {
                tgSettings.intervalHours = v;
                saveTg();
                const d = document.getElementById('tg-interval-display');
                if (d) d.textContent = v;
                if (tgSettings.active) startTgScheduler();
            }
        };

        window.tgToggleActive = () => {
            if (!tgSettings.active && tgSettings.groups.length === 0) return toast('Avval guruh yoki kanal qo\'shing!', 'error');
            if (!tgSettings.active && tgSettings.selectedListings.length === 0) return toast('Avval yuborish uchun uylarni tanlang!', 'error');
            tgSettings.active = !tgSettings.active;
            saveTg();
            startTgScheduler();
            toast(tgSettings.active ? '✅ Bot ishga tushdi!' : '⏹️ Bot to\'xtatildi', tgSettings.active ? 'success' : 'info');
            renderTelegramBot(document.getElementById('main-content'), document.getElementById('header-actions'));
        };

        window.tgSendNow = async () => {
            if (tgSettings.groups.length === 0) return toast('Avval guruh yoki kanal qo\'shing!', 'error');
            if (tgSettings.selectedListings.length === 0) return toast('Avval yuborish uchun uylarni tanlang!', 'error');
            toggleLoader(true);
            await runScheduledSend();
            toggleLoader(false);
        };

        const init = () => {
            if (!currentUser) return;

            // Arxivdagi eski rasmlarni tozalash (xavfsizlik uchun)
            if (archive.some(a => a.images && a.images.length > 0)) {
                archive = archive.map(a => ({ ...a, images: [] }));
                save();
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('sidebar-user-name').innerText = currentUser.name;
            document.getElementById('sidebar-user-role').innerText = currentUser.role;
            document.getElementById('user-avatar-text').innerText = currentUser.name[0];

            const nav = document.getElementById('nav-links');
            const mobileNav = document.getElementById('mobile-nav');
            const navItems = pages[currentUser.role];

            nav.innerHTML = navItems.map(p => `
                <button onclick="navigate('${p.id}')" id="nav-${p.id}" class="nav-btn w-full h-14 flex items-center gap-4 px-6 rounded-2xl text-slate-500 transition-all font-bold">
                    <i class="fa-solid ${p.icon} w-6 text-center"></i> <span>${p.label}</span>
                </button>
            `).join('');

            mobileNav.innerHTML = navItems.slice(0, 4).map(p => `
                <button onclick="navigate('${p.id}')" id="mobile-nav-${p.id}" class="mobile-nav-btn">
                    <i class="fa-solid ${p.icon}"></i> <span>${p.label}</span>
                </button>
            `).join('');

            navigate(navItems[0].id);
        };

        window.onload = async () => {
            if (currentUser) await loadDataFromSupabase();
            init();
            if (tgSettings.active && currentUser && currentUser.role === 'admin') startTgScheduler();
        };
    </script>
</body>

</html>
