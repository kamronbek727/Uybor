<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UyBor Navoiy — Ichki CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .soft-shadow {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04), 0 4px 10px -3px rgba(0, 0, 0, 0.02);
        }

        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            pointer-events: auto;
            padding: 16px 20px;
            border-radius: 16px;
            background: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            transform: translateX(120%);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid #f1f5f9;
        }

        .toast.show {
            transform: translateX(0);
        }

        .loader {
            border: 3px solid #f1f5f9;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .image-preview-item {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 14px;
            overflow: hidden;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
        }

        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .aspect-auto-img {
            object-fit: contain;
            background: #f1f5f9;
        }

        #full-loader-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .map-marker-blue {
            filter: hue-rotate(0deg);
        }

        .map-marker-red {
            filter: hue-rotate(140deg) saturate(1.5);
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {
            .mobile-bottom-nav {
                display: flex !important;
            }

            main {
                padding-bottom: 100px !important;
                /* Space for bottom nav */
            }

            .header-title {
                font-size: 1.25rem !important;
            }

            .p-8 {
                padding: 1.25rem !important;
            }

            .grid {
                gap: 1rem !important;
            }

            #modal-content {
                max-height: 100vh;
                border-radius: 0;
                width: 100% !important;
                margin: 0;
                bottom: 0px !important;
                position: fixed;
                border-top-left-radius: 32px;
                border-top-right-radius: 32px;
            }

            #modal-container {
                padding: 0;
                align-items: flex-end;
            }

            .listing-card-img {
                height: 180px !important;
            }

            .dashboard-card {
                padding: 1.25rem !important;
                gap: 1rem !important;
            }

            .dashboard-card i {
                font-size: 1.5rem !important;
                width: 3.5rem !important;
                height: 3.5rem !important;
            }

            .toast {
                left: 20px;
                right: 20px;
                transform: translateY(150%);
            }

            .toast.show {
                transform: translateY(0);
            }

            #toast-container {
                top: auto;
                bottom: 24px;
                right: 0;
                left: 0;
                padding: 0 20px;
            }
        }

        .mobile-bottom-nav {
            display: none;
            position: fixed;
            bottom: 24px;
            left: 24px;
            right: 24px;
            height: 72px;
            background: rgba(255, 255, 255, 0.82) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            border-radius: 36px !important;
            z-index: 1000 !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1) !important;
            justify-content: space-around;
            align-items: center;
            padding: 0 16px;
        }

        .mobile-nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            transition: all 0.3s;
            gap: 4px;
            flex: 1;
            height: 100%;
        }

        .mobile-nav-btn.active {
            color: #2563eb;
        }

        .mobile-nav-btn i {
            font-size: 1.25rem;
        }

        .mobile-nav-btn span {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .scroll-hide::-webkit-scrollbar {
            display: none;
        }

        .scroll-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body>
    <div id="full-loader-overlay" class="hidden">
        <div class="loader w-12 h-12 border-4"></div>
    </div>
    <div id="toast-container"></div>

    <!-- Login -->
    <div id="login-screen" class="fixed inset-0 bg-[#f8fafc] z-[1000] flex items-center justify-center p-4">
        <div class="w-full max-w-[420px] bg-white rounded-[32px] p-10 soft-shadow border border-slate-100 text-center">
            <div
                class="w-20 h-20 bg-blue-600 rounded-[24px] flex items-center justify-center text-white text-4xl mx-auto mb-8 shadow-xl shadow-blue-200">
                <i class="fa-solid fa-house-chimney"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-900 mb-2">Xush kelibsiz!</h1>
            <p class="text-slate-500 mb-10 font-medium">UyBor Navoiy CRM tizimiga kiring</p>
            <form id="login-form" class="space-y-6">
                <div class="text-left">
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Username</label>
                    <input type="text" id="login-username" required
                        class="w-full h-14 bg-slate-50 border-none rounded-2xl px-5 focus:ring-2 focus:ring-blue-500 transition-all font-semibold"
                        placeholder="admin yoki makler">
                </div>
                <div class="text-left">
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Parol</label>
                    <input type="password" id="login-password" required
                        class="w-full h-14 bg-slate-50 border-none rounded-2xl px-5 focus:ring-2 focus:ring-blue-500 transition-all font-semibold"
                        placeholder="••••••••">
                </div>
                <button type="submit"
                    class="w-full h-14 bg-blue-600 text-white rounded-2xl font-bold text-lg hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">Kirish</button>
            </form>
            <p class="mt-8 text-xs font-bold text-slate-400 uppercase tracking-widest">Admin: admin / 123</p>
        </div>
    </div>

    <!-- App Container -->
    <div id="app" class="hidden w-full h-full flex flex-col md:flex-row overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar"
            class="fixed inset-y-0 left-0 w-72 bg-white border-r border-slate-100 z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300 md:relative flex flex-col">
            <div class="p-8 flex items-center gap-4">
                <div
                    class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg shadow-blue-100">
                    <i class="fa-solid fa-house-user"></i>
                </div>
                <div>
                    <h2 class="text-xl font-black text-slate-900 leading-none">UyBor</h2>
                    <span class="text-[10px] font-black text-blue-600 uppercase tracking-[2px]">Navoiy CRM</span>
                </div>
            </div>
            <nav id="nav-links" class="flex-1 px-4 space-y-1 overflow-y-auto"></nav>
            <div class="p-6 border-t border-slate-50">
                <div class="bg-slate-50 rounded-2xl p-4 mb-4 flex items-center gap-3">
                    <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-blue-600 shadow-sm font-bold"
                        id="user-avatar-text">A</div>
                    <div class="overflow-hidden">
                        <p class="font-bold text-sm text-slate-900 truncate" id="sidebar-user-name">User Name</p>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-wider"
                            id="sidebar-user-role">Role</p>
                    </div>
                </div>
                <button onclick="logout()"
                    class="w-full h-12 text-red-500 hover:bg-red-50 rounded-xl font-bold transition-all flex items-center justify-center gap-2"><i
                        class="fa-solid fa-right-from-bracket"></i> Chiqish</button>
            </div>
        </aside>

        <!-- Main -->
        <main class="flex-1 flex flex-col min-w-0 bg-[#f8fafc]">
            <header
                class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 flex items-center justify-between px-8 z-40 sticky top-0">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()"
                        class="md:hidden w-10 h-10 flex items-center justify-center text-slate-500"><i
                            class="fa-solid fa-bars-staggered text-xl"></i></button>
                    <h2 id="page-title" class="text-2xl font-black text-slate-900 header-title">Dashboard</h2>
                </div>
                <div id="header-actions"></div>
            </header>
            <div id="main-content" class="flex-1 overflow-y-auto p-8 relative scroll-hide"></div>
        </main>
        <!-- Bottom Nav for Mobile -->
        <nav id="mobile-nav" class="mobile-bottom-nav"></nav>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="hidden fixed inset-0 z-[2000] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div id="modal-content"
            class="bg-white rounded-[32px] w-full max-w-2xl relative z-10 soft-shadow overflow-y-auto flex flex-col max-h-[90vh]">
        </div>
    </div>

    <!-- Map Picker Modal -->
    <div id="map-modal" class="hidden fixed inset-0 z-[3000] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onclick="closeMapModal()"></div>
        <div
            class="bg-white rounded-[32px] w-full max-w-4xl h-[80vh] relative z-10 soft-shadow overflow-hidden flex flex-col">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-xl font-bold">Xaritadan belgilang</h3>
                <button onclick="closeMapModal()"
                    class="w-10 h-10 rounded-full hover:bg-slate-100 flex items-center justify-center"><i
                        class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="picker-map" class="flex-1 bg-slate-100"></div>
            <div class="p-6 border-t border-slate-100 flex gap-4 items-center">
                <input type="text" id="picker-address"
                    class="flex-1 h-12 bg-slate-50 border-none rounded-xl px-4 font-semibold"
                    placeholder="Manzil matni...">
                <button onclick="confirmLocation()"
                    class="h-12 bg-blue-600 text-white px-8 rounded-xl font-bold shadow-lg shadow-blue-100">Tasdiqlash</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Data Keys
        const [K_USERS, K_LISTINGS, K_ARCHIVE, K_REQUESTS] = ['u_u', 'u_l', 'u_a', 'u_r'];

        // State
        let users = JSON.parse(localStorage.getItem(K_USERS)) || [{ id: '1', username: 'admin', password: '123', name: 'Admin', role: 'admin' }];
        let listings = JSON.parse(localStorage.getItem(K_LISTINGS)) || [];
        let archive = JSON.parse(localStorage.getItem(K_ARCHIVE)) || [];
        let requests = JSON.parse(localStorage.getItem(K_REQUESTS)) || [];
        let currentUser = JSON.parse(sessionStorage.getItem('u_session')) || null;
        let uploadImgs = [];
        let curPage = 'dashboard';
        let mapFocus = null;
        let pMap, pMarker, pLoc = null;

        // Helpers
        const save = () => {
            localStorage.setItem(K_USERS, JSON.stringify(users));
            localStorage.setItem(K_LISTINGS, JSON.stringify(listings));
            localStorage.setItem(K_ARCHIVE, JSON.stringify(archive));
            localStorage.setItem(K_REQUESTS, JSON.stringify(requests));
        };
        const toast = (m, t = 'info') => {
            const c = document.getElementById('toast-container');
            const el = document.createElement('div');
            const icons = { success: 'fa-circle-check text-emerald-500', error: 'fa-circle-exclamation text-red-500', info: 'fa-circle-info text-blue-500' };
            el.className = `toast show ${t}`;
            el.innerHTML = `<i class="fa-solid ${icons[t]} text-xl"></i> <span>${m}</span>`;
            c.appendChild(el);
            setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 500); }, 3000);
        };
        const money = (v, c = 'USD') => new Intl.NumberFormat('uz-UZ').format(v) + (c === 'USD' ? ' $' : ' so\'m');
        const dt = (s) => new Date(s).toLocaleString('uz-UZ', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        const gid = () => Math.random().toString(36).substr(2, 9);
        const toggleLoader = (v) => document.getElementById('full-loader-overlay').style.display = v ? 'flex' : 'none';
        window.closeModal = () => document.getElementById('modal-container').classList.add('hidden');
        window.closeMapModal = () => document.getElementById('map-modal').classList.add('hidden');

        // Auth
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const uInput = document.getElementById('login-username').value;
            const pInput = document.getElementById('login-password').value;
            const user = users.find(u => u.username === uInput && u.password === pInput);
            if (user) {
                currentUser = user;
                sessionStorage.setItem('u_session', JSON.stringify(user));
                init();
            } else toast('Login yoki parol xato', 'error');
        };
        const logout = () => {
            sessionStorage.removeItem('u_session');
            location.reload();
        };

        // Navigation
        const pages = {
            admin: [
                { id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard' },
                { id: 'listings', icon: 'fa-house', label: 'Uylar' },
                { id: 'archive', icon: 'fa-box-archive', label: 'Arxiv' },
                { id: 'map', icon: 'fa-map-location-dot', label: 'Xarita' },
                { id: 'requests', icon: 'fa-bell', label: 'So\'rovlar' },
                { id: 'maklers', icon: 'fa-users', label: 'Maklerlar' }
            ],
            makler: [
                { id: 'listings', icon: 'fa-house', label: 'Uylar' },
                { id: 'archive', icon: 'fa-box-archive', label: 'Sotilganlar' },
                { id: 'map', icon: 'fa-map-location-dot', label: 'Xarita' },
                { id: 'requests', icon: 'fa-clock', label: 'Kutilayotgan' }
            ]
        };

        const navigate = (id) => {
            curPage = id;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-blue-50', 'text-blue-600', 'font-black'));
            document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));

            document.getElementById('nav-' + id)?.classList.add('bg-blue-50', 'text-blue-600', 'font-black');
            document.getElementById('mobile-nav-' + id)?.classList.add('active');

            const page = pages[currentUser.role].find(p => p.id === id);
            document.getElementById('page-title').innerText = page ? page.label : 'Dashboard';

            render(id);
            if (window.innerWidth < 768) toggleSidebar(false);
        };

        const toggleSidebar = (v) => {
            const s = document.getElementById('sidebar');
            if (v === undefined) s.classList.toggle('-translate-x-full');
            else v ? s.classList.remove('-translate-x-full') : s.classList.add('-translate-x-full');
        };

        // Renderers
        const render = (id) => {
            const main = document.getElementById('main-content');
            const hActions = document.getElementById('header-actions');
            main.innerHTML = '';
            hActions.innerHTML = '';

            if (id === 'dashboard') renderDashboard(main);
            else if (id === 'listings') renderListings(main, hActions, false);
            else if (id === 'archive') renderListings(main, hActions, true);
            else if (id === 'maklers') renderMaklers(main, hActions);
            else if (id === 'requests') renderRequests(main);
            else if (id === 'map') renderMap(main);
        };

        const renderDashboard = (con) => {
            if (currentUser.role !== 'admin') {
                con.innerHTML = `<div class="bg-white p-12 rounded-[32px] soft-shadow text-center">
                    <h2 class="text-3xl font-black mb-4">Salom, ${currentUser.name}!</h2>
                    <p class="text-slate-500">Bugungi sotuvlaringizni boshlang.</p>
                </div>`;
                return;
            }
            const activeCount = listings.length;
            const soldCount = archive.length;
            const mCount = users.filter(u => u.role === 'makler').length;
            con.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                    <div class="bg-white p-8 rounded-[32px] soft-shadow border border-slate-50 flex items-center gap-6 dashboard-card">
                        <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-3xl"><i class="fa-solid fa-house"></i></div>
                        <div><p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Sotuvda</p><h3 class="text-4xl font-black">${activeCount}</h3></div>
                    </div>
                    <div class="bg-white p-8 rounded-[32px] soft-shadow border border-slate-50 flex items-center gap-6 dashboard-card">
                        <div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center text-3xl"><i class="fa-solid fa-check-double"></i></div>
                        <div><p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Sotilgan</p><h3 class="text-4xl font-black">${soldCount}</h3></div>
                    </div>
                    <div class="bg-white p-8 rounded-[32px] soft-shadow border border-slate-50 flex items-center gap-6 dashboard-card">
                        <div class="w-16 h-16 bg-purple-50 text-purple-600 rounded-2xl flex items-center justify-center text-3xl"><i class="fa-solid fa-users"></i></div>
                        <div><p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Maklerlar</p><h3 class="text-4xl font-black">${mCount}</h3></div>
                    </div>
                </div>
                <div class="bg-white p-10 rounded-[40px] soft-shadow border border-slate-50">
                    <h4 class="text-xl font-black mb-8">Reyting</h4>
                    <div class="space-y-6">
                        ${users.filter(u => u.role === 'makler').map(m => {
                const count = archive.filter(a => a.maklerId === m.id).length;
                return `
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center font-bold text-slate-600">${m.name[0]}</div>
                                    <div class="flex-1">
                                        <div class="flex justify-between mb-2"><span class="font-bold">${m.name}</span><span class="font-black text-blue-600">${count} ta</span></div>
                                        <div class="h-2 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-blue-600 rounded-full" style="width: ${Math.min(100, (count / 10) * 100)}%"></div></div>
                                    </div>
                                </div>
                            `;
            }).join('')}
                    </div>
                </div>
            `;
        };
        const renderListings = (con, act, isArchive) => {
            let data = isArchive ? archive : listings;

            const filterHtml = `
                <div class="bg-white p-6 rounded-[32px] border border-slate-50 mb-8 flex flex-wrap gap-4 items-end soft-shadow">
                    <div class="flex-1 min-w-[200px]"><label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest px-1">Qidirish</label><input type="text" id="f-search" oninput="applyFilters(${isArchive})" placeholder="Manzil..." class="w-full h-12 bg-slate-50 border-none rounded-xl px-4 font-bold focus:ring-2 focus:ring-blue-500"></div>
                    <div><label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest px-1">Turi</label><select id="f-cat" onchange="applyFilters(${isArchive})" class="h-12 bg-slate-50 border-none rounded-xl px-4 font-bold focus:ring-2 focus:ring-blue-500"><option value="">Barchasi</option><option value="Sotuv">Sotuv</option><option value="Ijara">Ijara</option></select></div>
                    <div><label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest px-1">Shakl</label><select id="f-type" onchange="applyFilters(${isArchive})" class="h-12 bg-slate-50 border-none rounded-xl px-4 font-bold focus:ring-2 focus:ring-blue-500"><option value="">Barchasi</option><option value="Dom">Dom</option><option value="Hovli">Hovli</option></select></div>
                    <div><label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest px-1">Xonalar</label><select id="f-rooms" onchange="applyFilters(${isArchive})" class="h-12 bg-slate-50 border-none rounded-xl px-4 font-bold focus:ring-2 focus:ring-blue-500"><option value="">Barchasi</option><option value="1">1 xona</option><option value="2">2 xona</option><option value="3">3 xona</option><option value="4">4+ xona</option></select></div>
                </div>
            `;

            act.innerHTML = !isArchive && (currentUser.role === 'admin' || currentUser.role === 'makler') ? `<button onclick="openListingModal()" class="h-12 bg-blue-600 text-white px-6 rounded-2xl font-bold shadow-lg shadow-blue-100 flex items-center gap-2"><i class="fa-solid fa-plus"></i> Yangi e'lon</button>` : '';

            con.innerHTML = filterHtml + '<div id="listing-grid-container"></div>';
            renderGrid(data, isArchive);
        };

        const applyFilters = (isArchive) => {
            let data = isArchive ? archive : listings;

            const search = document.getElementById('f-search').value.toLowerCase();
            const cat = document.getElementById('f-cat').value;
            const type = document.getElementById('f-type').value;
            const rooms = document.getElementById('f-rooms').value;

            const filtered = data.filter(d => {
                const matchSearch = (d.addressText || '').toLowerCase().includes(search);
                const matchCat = !cat || d.category === cat;
                const matchType = !type || d.type === type;

                listings.forEach(l => {

                    m.bindPopup(`
                        <div class="p-2 min-w-[200px]">

                    m.bindPopup(`

        const deleteUser = (id) => { if (confirm('O\'chirilsinmi?')) { users = users.filter(u => u.id !== id); save(); render('maklers'); } };

        const openListingModal = (id = null) => {

                            <div id="loc-status" class="w-20 h-20 bg-slate-50 rounded-[28px] ${pLoc ? 'flex' : 'hidden'} items-center justify-center text-emerald-500 text-2xl border-2 border-emerald-100"><i class="fa-solid fa-check"></i></div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 mb-2 px-1 uppercase tracking-widest">To'liq Manzil</label>
                            <input type="text" id="l-address" value="${l?.addressText || ''}" class="w-full h-14 bg-slate-50 border-none rounded-2xl px-5 font-bold" placeholder="Ko'cha, uy raqami, mo'ljal...">
                        </div>
                        <div class="grid grid-cols-2 gap-8 mt-8">
                            <div><label class="block text-[10px] font-black text-slate-400 mb-2 px-1 uppercase tracking-widest">Narxi</label><input type="number" id="l-price" value="${l?.price || ''}" class="w-full h-14 bg-slate-50 border-none rounded-2xl px-5 font-black text-xl text-blue-600"></div>
                            <div><label class="block text-[10px] font-black text-slate-400 mb-2 px-1 uppercase tracking-widest">Valyuta</label><select id="l-curr" class="w-full h-14 bg-slate-50 border-none rounded-2xl px-5 font-bold"><option value="USD" ${l?.currency === 'USD' ? 'selected' : ''}>USD ($)</option><option value="UZS" ${l?.currency === 'UZS' ? 'selected' : ''}>UZS (so'm)</option></select></div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">

                            <div><label class="block text-[10px] font-black text-slate-400 mb-2 px-1 uppercase tracking-widest">Xonalar</label><input type="number" id="l-rooms" value="${l?.rooms || '1'}" class="w-full h-12 bg-slate-50 border-none rounded-2xl px-4 font-bold"></div>

            closeMapModal();

        const handleImgs = async (i) => {
            const files = Array.from(i.files); toggleLoader(true);
            for (const f of files) {
                const b64 = await compress(f);
                if (uploadImgs.length < 20) uploadImgs.push(b64);
            }
            document.getElementById('img-pre-grid').innerHTML = uploadImgs.map(img => `<div class="w-20 h-20 rounded-2xl overflow-hidden border border-slate-200 flex-shrink-0"><img src="${img}" class="w-full h-full object-contain bg-black"></div>`).join('');
            toggleLoader(false);
        };

        const compress = (f) => new Promise(res => {
            const r = new FileReader(); r.readAsDataURL(f);
            r.onload = e => {
                const i = new Image(); i.src = e.target.result;
                i.onload = () => {
                    const c = document.createElement('canvas'); const ct = c.getContext('2d');
                    let w = i.width, h = i.height; const max = 1200;
                    if (w > h) { if (w > max) { h *= max / w; w = max; } } else { if (h > max) { w *= max / h; h = max; } }
                    c.width = w; c.height = h; ct.drawImage(i, 0, 0, w, h);
                    res(c.toDataURL('image/jpeg', 0.7));
                };
            };

                category: document.getElementById('l-cat').value, type: document.getElementById('l-type').value,
                rooms: document.getElementById('l-rooms').value,

            };

                const idx = listings.findIndex(l => l.id === id);

                    const aidx = archive.findIndex(l => l.id === id);
                    if (aidx !== -1) archive[aidx] = { ...archive[aidx], ...data };

                listings.push({ id: gid(), maklerId: currentUser.id, createdAt: new Date().toISOString(), ...data });

        };

        const deleteListing = (id) => {
            if (confirm('Ushbu e\'lon butunlay o\'chirilsinmi?')) {
                listings = listings.filter(l => l.id !== id);
                archive = archive.filter(l => l.id !== id);
                save(); render(curPage);
            }
        };

        const requestSold = (id) => {
            if (currentUser.role === 'admin') {
                if (confirm('Ushbu uyni sotilgan deb belgilaysizmi?')) {
                    const idx = listings.findIndex(l => l.id === id);
                    if (idx !== -1) {

                        archive.push({ ...itm, soldAt: new Date().toISOString(), images: [] });

                if (confirm('Sotilganini tasdiqlash uchun adminga so\'rov yuborilsinmi?')) {
                    requests.push({ id: gid(), listingId: id, maklerId: currentUser.id, date: new Date().toISOString() });

        const approveSale = (rid) => {
            const req = requests.find(r => r.id === rid);
            const idx = listings.findIndex(l => l.id === req.listingId);
            if (idx !== -1) {
                const itm = listings[idx];
                archive.push({ ...itm, soldAt: new Date().toISOString(), images: [] });
                listings.splice(idx, 1);
            }
            requests = requests.filter(r => r.id !== rid);
            save(); toast('Sotuv tasdiqlandi', 'success'); render('requests');
        };
        const rejectSale = (rid) => { requests = requests.filter(r => r.id !== rid); save(); render('requests'); };

        const viewDetail = (id, archiveMode) => {
            const itm = archiveMode ? archive.find(l => l.id === id) : listings.find(l => l.id === id);
            if (!itm) return;
            window.closeModal(); // Small delay to ensure clean transition
            setTimeout(() => {
                showModal(`
                    <div class="p-6 md:p-10">
                        <div class="flex gap-4 overflow-x-auto pb-4 mb-8 scroll-hide">
                            ${itm.images?.length > 0 ? itm.images.map(img => `
                                <div class="h-80 min-w-[300px] md:min-w-[500px] bg-slate-900 rounded-[32px] overflow-hidden flex-shrink-0">
                                    <img src="${img}" class="w-full h-full object-contain">
                                </div>
                            `).join('') : `<div class="h-80 w-full bg-slate-100 rounded-[32px] flex items-center justify-center text-slate-300 text-6xl"><i class="fa-solid fa-image"></i></div>`}
                        </div>
                        <h3 class="text-3xl font-black mb-4">${money(itm.price, itm.currency)}</h3>
                        <p class="text-xl font-bold text-slate-700 mb-6">${itm.addressText || 'Manzil ko\'rsatilmagan'}</p>
                        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 bg-slate-50 p-6 rounded-[28px] border border-slate-100 mb-4">
                            <div><p class="text-[10px] font-black text-slate-400 uppercase mb-1">Xonalar</p><p class="font-black text-slate-900">${itm.rooms} xona</p></div>
                            <div><p class="text-[10px] font-black text-slate-400 uppercase mb-1">Maydoni</p><p class="font-black text-slate-900">${itm.area} m²</p></div>
                            <div><p class="text-[10px] font-black text-slate-400 uppercase mb-1">Sana</p><p class="font-bold text-slate-900">${dt(itm.createdAt)}</p></div>
                            <div><p class="text-[10px] font-black text-slate-400 uppercase mb-1">Shakl</p><p class="font-black text-blue-600">${itm.type || 'Hovli'}</p></div>
                        </div>
                        ${itm.desc ? `<div class="bg-slate-50 p-6 rounded-[28px] border border-slate-100 mb-4"><p class="text-[10px] font-black text-slate-400 uppercase mb-2">Izoh</p><p class="font-medium text-slate-700 leading-relaxed">${itm.desc}</p></div>` : ''}
                        <div class="grid grid-cols-2 gap-6 bg-slate-50 p-6 rounded-[28px] border border-slate-100">
                            <div><p class="text-[10px] font-black text-slate-400 uppercase mb-1">Kategoriya</p><p class="font-black text-slate-900">${itm.category}</p></div>
                            <div><p class="text-[10px] font-black text-slate-400 uppercase mb-1">Narxi</p><p class="font-black text-blue-600">${money(itm.price, itm.currency)}</p></div>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-4 mt-10">
                            ${!archiveMode ? `<button onclick="window.requestSold('${itm.id}')" class="flex-1 h-16 bg-emerald-500 text-white rounded-[28px] font-black shadow-lg shadow-emerald-100 flex items-center justify-center gap-2 transition-all hover:scale-[1.02]"><i class="fa-solid fa-dollar-sign text-xl"></i> Sotilgan deb belgilash</button>` : ''}
                            <button onclick="showOnMap(${itm.loc.lat}, ${itm.loc.lng}, '${itm.addressText || ''}')" class="flex-1 h-16 bg-blue-600 text-white rounded-[28px] font-black shadow-lg shadow-blue-100 flex items-center justify-center gap-2 transition-all hover:scale-[1.02]"><i class="fa-solid fa-map-location-dot text-xl"></i> Xaritada ko'rish</button>
                            <button onclick="window.closeModal()" class="flex-1 h-16 bg-slate-100 text-slate-500 rounded-[28px] font-black">Yopish</button>
                        </div>
                    </div>
                `);
            }, 100);
        };
        window.viewDetail = viewDetail; // Make accessible globally for map popups
        window.requestSold = requestSold;

        const showOnMap = (lat, lng, label) => {
            closeModal();
            mapFocus = { lat, lng, label };
            navigate('map');
        };

        const init = () => {
            if (!currentUser) return;

            // Arxivdagi eski rasmlarni tozalash (xavfsizlik uchun)
            if (archive.some(a => a.images && a.images.length > 0)) {
                archive = archive.map(a => ({ ...a, images: [] }));
                save();
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('sidebar-user-name').innerText = currentUser.name;
            document.getElementById('sidebar-user-role').innerText = currentUser.role;
            document.getElementById('user-avatar-text').innerText = currentUser.name[0];

            const nav = document.getElementById('nav-links');
            const mobileNav = document.getElementById('mobile-nav');
            const navItems = pages[currentUser.role];

            nav.innerHTML = navItems.map(p => `
                <button onclick="navigate('${p.id}')" id="nav-${p.id}" class="nav-btn w-full h-14 flex items-center gap-4 px-6 rounded-2xl text-slate-500 transition-all font-bold">
                    <i class="fa-solid ${p.icon} w-6 text-center"></i> <span>${p.label}</span>
                </button>
            `).join('');

            mobileNav.innerHTML = navItems.slice(0, 4).map(p => `
                <button onclick="navigate('${p.id}')" id="mobile-nav-${p.id}" class="mobile-nav-btn">
                    <i class="fa-solid ${p.icon}"></i> <span>${p.label}</span>
                </button>
            `).join('');

            navigate(navItems[0].id);
        };

        window.onload = init;
    </script>
</body>

</html>
